<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image gallery</title>
    <style>
        .container
        {
            width: 80%;
            min-height: 250px;
            margin: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .container .box
        {
            width: 70%;
            height: 580px;
            margin: auto;
            border: 1px solid #000;
        }
        .container .btn
        {
            display: flex;
            gap: 8px;
        }
        .container .btn input
        {
            width: 85px;
            height: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box" >
            <img id="imgShow" src="./images/pqr12.jpg" style="width: 100%; height: 100%;" alt="not found">
        </div>
        <div class="btn">
            <input type="button" value="Prevoius" onclick="prev()">
            <input type="button" value="Next" onclick="next()">
        </div>
    </div>
    <script type="text/javascript" src="./index.js"></script>
</body>
</html>
