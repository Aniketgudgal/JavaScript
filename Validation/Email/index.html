<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Validation</title>
    <style>
        *
        {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container
        {
            width: 80%;
            min-height: 150px;
            margin: auto;
            border: 1px solid #000;
        }
        .container .box
        {
            width: 80%;
            min-height: 120px;
            margin: auto;
            /* border: 1px solid #000; */
            margin-top: 40px;
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }
        .container .box input
        {
            height: 35px;
            width: 40%;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <input type="text" value="" id="checkId" placeholder="Enter Email ID">
            <input type="button" value="Validate" onclick="checkEmail()">
            <div id="displayData">
            </div>
        </div>
    </div>
    <script src="./index.js"></script>
</body>
</html>
