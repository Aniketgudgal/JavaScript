<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container
        {
            width: 80%;
            min-height: 250px;
            margin: auto;
        }
        .container .box
        {
            width: 80%;
            margin: auto;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .container .box input
        {
            width: 50%;
            height: 25px;
            margin: auto;
        }
        .container .box button
        {
            width: 50%;
            margin: auto;
            height: 35px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <input type="number" id="in" value="" placeholder="Enter Moblie Number">
            <button onclick="checkNum()" >Validate Number</button>
            <span id="sp"></span>
        </div>
    </div>
    <script type="text/javascript" src="./index.js" ></script>
</body>
</html>
