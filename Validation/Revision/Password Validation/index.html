<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Validation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        width: 80%;
        padding: 8px;
        margin: auto;
        min-height: 200px;
      }
      .container input {
        width: 30%;
        height: 30px;
      }
      .container button {
        width: 20%;
        height: 30px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <input type="text" value="" id="pass" placeholder="Enter your name" />
      <button onclick="checkPass()">Validate</button>
      <div>
        <span id="output"></span>
      </div>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
